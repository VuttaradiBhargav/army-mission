<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Army Man: Elite Ops Loadout</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: #0d0f0d;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .screen {
            width: 100%;
            max-width: 900px;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            transform: translateY(20px);
        }

        .container {
            background: rgba(20, 30, 20, 0.95);
            border: 2px solid #4b5320;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
            text-align: center;
            border-radius: 10px;
        }

        #home-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 80vh;
        }

        .glitch-title {
            font-size: 3rem;
            letter-spacing: 8px;
            text-shadow: 2px 2px #ff0000, -2px -2px #0000ff;
            margin-bottom: 20px;
            word-break: break-word;
        }

        #soldier-3d {
            width: 280px;
            max-width: 100%;
            filter: drop-shadow(0 0 15px #4b5320);
            animation: breathe 4s infinite ease-in-out;
            background: #1a1d1a;
            border: 2px solid #4b5320;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @keyframes breathe {
            0%, 100% {
                transform: scale(1);
                filter: brightness(1);
            }
            50% {
                transform: scale(1.05);
                filter: brightness(1.2);
            }
        }

        .action-btn {
            background-color: #4b5320;
            color: #fff;
            padding: 18px 40px;
            font-size: 1.2rem;
            border: 2px solid #00ff00;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            border-radius: 8px;
        }

        .action-btn:hover {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 20px #00ff00;
        }

        .weight-panel {
            font-size: 1.8rem;
            border: 1px solid #4b5320;
            padding: 15px;
            margin: 20px 0;
            background: #000;
            position: sticky;
            top: 10px;
            z-index: 10;
            border-radius: 8px;
        }

        .gear-card {
            display: flex;
            align-items: center;
            background: #1a1d1a;
            margin: 15px 0;
            padding: 15px;
            border-left: 6px solid #4b5320;
            text-align: left;
            animation: slideIn 0.5s ease forwards;
            border-radius: 8px;
            gap: 15px;
        }

        .gear-card img {
            width: 80px;
            height: 80px;
            border: 1px solid #00ff00;
            object-fit: cover;
            background: #333;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .gear-info strong {
            display: block;
            font-size: 1.1rem;
            margin-bottom: 5px;
            text-transform: capitalize;
        }

        .gear-info small {
            color: #b7ffb7;
            line-height: 1.4;
        }

        .mission-map {
            margin-top: 30px;
            width: 100%;
            height: 300px;
            background: url('https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?w=1200') center/cover no-repeat;
            border: 2px solid #00ff00;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
        }

        .scan-line {
            width: 100%;
            height: 2px;
            background: #00ff00;
            position: absolute;
            top: 0;
            animation: scan 3s linear infinite;
            box-shadow: 0 0 10px #00ff00;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 600px) {
            .glitch-title {
                font-size: 2rem;
                letter-spacing: 4px;
            }

            .gear-card {
                flex-direction: column;
                text-align: center;
            }

            .gear-info {
                text-align: center;
            }

            .weight-panel {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <!-- HOME SCREEN -->
    <div id="home-screen" class="screen container">
        <h1 class="glitch-title">Alpha Team Spectrum</h1>
        <p>[ SYSTEM STATUS: READY ]</p>
        <br />
        <button id="start-btn" class="action-btn">INITIALIZE LOADOUT</button>
    </div>

    <!-- MISSION HUD -->
    <div id="mission-hud" class="screen container hidden">
        <!-- FIXED: soldier.gif -->
        <img id="soldier-3d" src="images/soldier.gif" alt="SOLDIER UNIT" onerror="this.src='https://via.placeholder.com/280x280?text=Soldier+GIF+Missing';" />

        <div class="weight-panel">
            CURRENT LOAD: <span id="weight-val">0</span> LBS
        </div>

        <div id="gear-list"></div>

        <div id="map-area" class="mission-map" style="display: none;">
            <div class="scan-line"></div>
            <div style="padding: 10px; background: rgba(0,0,0,0.8); position: absolute; bottom: 0; width: 100%;">
                MISSION PARAMETERS LOADED: TARGET SECTOR ALPHA
            </div>
        </div>
    </div>

    <script>
        // IMPORTANT:
        // Make sure these filenames match EXACTLY with your GitHub images folder.
        const gearItems = [
            { name: "Ballistic Helmet", w: 4, img: "ballistic-helmet.png", d: "Level IIIA protection." },
            { name: "Plate Carrier", w: 22, img: "plate-carrier.png", d: "Ceramic multi-hit plates." },
            { name: "M4A1 Carbine", w: 8, img: "m4a1-carbine.png", d: "5.56mm NATO Primary." },
            { name: "M9 Beretta Pistol", w: 3, img: "m9-beretta-pistol.png", d: "Secondary sidearm." },
            { name: "Frag Grenades", w: 6, img: "frag-grenades.png", d: "M67 Fragmentation." },
            { name: "Smoke Grenades", w: 3, img: "smoke-grenades.png", d: "M18 Tactical Smoke." },
            { name: "Extra Ammo Mags", w: 10, img: "extra-ammo-mags.png", d: "Full combat load." },
            { name: "Night Vision (PVS-14)", w: 2, img: "night-vision-pvs14.png", d: "Gen 3+ Optics." },
            { name: "Tactical Radio", w: 3, img: "tactical-radio.png", d: "PRC-152 Comms." },
            { name: "IFAK Medical Kit", w: 2, img: "ifak-medical-kit.png", d: "Trauma Supplies." },
            { name: "Hydration System", w: 7, img: "hydration-system.png", d: "3L Reservoir." },
            { name: "MRE Rations", w: 4, img: "mre-rations.png", d: "Field Nutrition." }
        ];

        const startBtn = document.getElementById('start-btn');
        const homeScreen = document.getElementById('home-screen');
        const missionHud = document.getElementById('mission-hud');
        const weightSpan = document.getElementById('weight-val');
        const gearList = document.getElementById('gear-list');
        const map = document.getElementById('map-area');

        let currentWeight = 0;

        startBtn.addEventListener('click', async () => {
            homeScreen.classList.add('hidden');

            setTimeout(async () => {
                missionHud.classList.remove('hidden');

                for (let item of gearItems) {
                    const div = document.createElement('div');
                    div.className = 'gear-card';

                    div.innerHTML = `
                        <img src="images/${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/80?text=Gear';">
                        <div class="gear-info">
                            <strong>${item.name}</strong>
                            <small>${item.d}</small>
                        </div>
                    `;

                    gearList.appendChild(div);

                    let target = currentWeight + item.w;

                    while (currentWeight < target) {
                        currentWeight++;
                        weightSpan.innerText = currentWeight;
                        await new Promise(resolve => setTimeout(resolve, 20));
                    }

                    await new Promise(resolve => setTimeout(resolve, 300));
                }

                map.style.display = "block";
                window.scrollTo({
                    top: document.body.scrollHeight,
                    behavior: 'smooth'
                });
            }, 800);
        });
    </script>
</body>
</html>
